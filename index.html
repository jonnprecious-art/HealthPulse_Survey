<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthPulse Survey</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
  h2 { color: #0A7E75; }
  label { display: block; margin-top: 15px; font-weight: bold; }
  input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
  h3 { color: #333; margin-top: 25px; }
  button { margin-top: 25px; background: #0A7E75; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
  button:hover { background: #085f58; }
</style>
</head>
<body>
  <h2>HealthPulse Survey</h2>
  <p>Help us understand income and spending patterns in your community.</p>
  <form action="/submit" method="POST">
    <label>Age</label>
    <input type="number" name="age" required>

    <label>Gender</label>
    <select name="gender">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Non-binary">Non-binary</option>
      <option value="Prefer not to say">Prefer not to say</option>
    </select>

    <label>Total Monthly Income (USD)</label>
    <input type="number" name="income" required>

    <h3>Monthly Expenses (USD)</h3>
    <label>Utilities</label>
    <input type="number" name="utilities" placeholder="0">

    <label>Entertainment</label>
    <input type="number" name="entertainment" placeholder="0">

    <label>School Fees</label>
    <input type="number" name="school_fees" placeholder="0">

    <label>Shopping</label>
    <input type="number" name="shopping" placeholder="0">

    <label>Healthcare</label>
    <input type="number" name="healthcare" placeholder="0">

    <button type="submit">Submit Survey</button>
  </form>
</body>
</html>
